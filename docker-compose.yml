# MySQL untuk development Asterra Studio.
# Sengaja TIDAK menyetel lower_case_table_names → memakai default Linux (=0, case-sensitive),
# meniru kondisi asli produksi. Nama tabel tersimpan apa adanya (PascalCase dari model Prisma).
# Konsekuensi: gunakan Docker (bukan MySQL Laragon Windows yang case-insensitive). Lihat docs/DATABASE.md.
services:
  mysql:
    image: mysql:8.0
    container_name: asterra-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-asterra_studio}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - asterra-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  asterra-mysql-data:
